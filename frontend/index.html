<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>CreatorAI Lab v2.0</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="container">

    <!-- HERO -->
    <header class="hero">
      <h1>CreatorAI Lab</h1>
      <p>AI Creative Director System</p>
      <span>Turn ideas into structured creativity</span>
    </header>

    <!-- INPUT -->
    <div class="search-section">
      <input id="input" placeholder="Type your idea..." />
      <button id="btn">Generate</button>
    </div>

    <!-- STYLE / DIRECTION -->
    <div class="direction-box">
      <div class="direction-buttons">
        <button class="direction-btn active" data-style="viral">🔥 Viral</button>
        <button class="direction-btn" data-style="artistic">🎨 Artistic</button>
        <button class="direction-btn" data-style="storytelling">📖 Storytelling</button>
      </div>
    </div>

    <!-- RESULT -->
    <div id="result" class="result-container"></div>

  </div>

  <script src="js/script.js"></script>

</body>
</html>
